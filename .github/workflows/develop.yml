name: Development Cycle 

on:

  push:
    branches:
      - 'develop'

env:
  SOLUTION: '.\InfoPhoenix.sln'
  CONFIGURATION: 'Debug'
  RUNTIME: 'win-x64'
  TARGET_FRAMEWORK: 'net6.0-windows'
  TARGET_PLATFORM: 'x64'
  COVERAGE_REPORT_PATH: '.\code-coverage\report'
  COVERAGE_FILE: '.\code-coverage\**\coverage.cobertura.xml'

jobs:

  build:

    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 0 # avoid shallow clone
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.8.3'

      - name: Setup GitHub Package Registry for NuGet
        run: |
          dotnet nuget add source `
            --username ${{ github.repository_owner }} `
            --password ${{ secrets.GITHUB_TOKEN }} `
            --store-password-in-clear-text `
            --name github ${{ vars.NUGET_SOURCE_URL }}

      - name: Restore Solution
        run: |
          msbuild $env:SOLUTION `
            /t:Restore `
            /p:Configuration=$env:CONFIGURATION `
            /p:RuntimeIdentifier=$env:RUNTIME

      - name: Build Solution
        if: success()
        run: |
          msbuild $env:SOLUTION `
            /p:Platform=$env:TARGET_PLATFORM `
            /p:Configuration=$env:CONFIGURATION `
            /p:Framework=$env:TARGET_FRAMEWORK

      - name: Run Test Suite
        if: success()
        run: |
          dotnet test `
            --no-restore `
            --no-build `
            --logger:"Html;LogFileName=code-coverage-log.html" `
            --collect:"XPlat Code Coverage" `
            --results-directory ./code-coverage/ `
            --filter "Category!=RunsOnDevMachine" `
            --settings .runsettings `
            --verbosity normal

      - name: Prepare for Coverage Report
        if: success()
        run: |
          dotnet tool install dotnet-reportgenerator-globaltool `
            --version 5.3.0 `
            --global

      - name: Generate Coverage Report
        if: success()
        run: |
          reportgenerator `
            "-reports:$env:COVERAGE_FILE" `
            "-targetdir:$env:COVERAGE_REPORT_PATH" `
            -reporttypes:Html

      - name: Store Coverage Report
        uses: actions/upload-artifact@v4.3.3
        if: success()
        with:
          name: test-coverage-report
          path: $env:COVERAGE_REPORT_PATH
          retention-days: 7
