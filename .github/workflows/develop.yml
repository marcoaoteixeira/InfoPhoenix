name: Development Cycle 

on:

  push:
    branches:
      - 'develop'

jobs:

  run_develop_build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet-version: ['8.0.x']

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4.1.6
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup GitHub Package Registry for NuGet
        run: |
          dotnet nuget add source \
          --username ${{ github.repository_owner }} \
          --password ${{ secrets.GITHUB_TOKEN }} \
          --store-password-in-clear-text \
          --name github ${{ vars.NUGET_SOURCE_URL }}

      - name: Restore Solution
        run: dotnet restore

      - name: Build Solution
        if: success()
        run: |
          dotnet build \
          --configuration Debug \
          --no-restore \
          --verbosity normal

      - name: Run Test Suite
        if: success()
        run: |
          dotnet test \
          --no-restore \
          --no-build \
          --logger:"Html;LogFileName=code-coverage-log.html" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./code-coverage/ \
          --filter "Category!=RunsOnDevMachine" \
          --settings .runsettings \
          --verbosity detailed

      - name: Prepare for Coverage Report
        if: success()
        run: |
          dotnet tool install \
          dotnet-reportgenerator-globaltool \
          --version 5.3.0 \
          --global

      - name: Generate Coverage Report
        if: success()
        run: |
          reportgenerator \
          "-reports:./code-coverage/**/coverage.cobertura.xml" \
          "-targetdir:./code-coverage/report" \
          -reporttypes:Html

      - name: Store Coverage Report
        uses: actions/upload-artifact@v4.3.3
        if: success()
        with:
          name: test-coverage-report
          path: "./code_coverage/coverage_report"
          retention-days: 7
