name: Release Cycle

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  SOLUTION: '.\src\Nameless.InfoPhoenix.Client\Nameless.InfoPhoenix.Client.csproj'
  CONFIGURATION: 'Release'
  RUNTIME: 'win-x64'
  TARGET_FRAMEWORK: 'net6.0-windows'
  TARGET_PLATFORM: 'x64'
  OUTPUT_PATH: '.\output'

jobs:

  build:

    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 0 # avoid shallow clone

      - name: Get Build Version
        id: build
        run: |
          $BUILD_VERSION = [regex]::split($env:GITHUB_REF, "v(.*)")[1]
          Write-Output BUILD_VERSION=$BUILD_VERSION >> $env:GITHUB_ENV
          Write-Host "v$BUILD_VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.8.3'

      - name: Setup GitHub Package Registry for NuGet
        run: |
          dotnet nuget add source `
            --username ${{ github.repository_owner }} `
            --password ${{ secrets.GITHUB_TOKEN }} `
            --store-password-in-clear-text `
            --name github ${{ vars.NUGET_SOURCE_URL }}

      - name: Restore Solution
        run: |
          msbuild $env:SOLUTION `
            /t:Restore `
            /p:Configuration=$env:CONFIGURATION `
            /p:RuntimeIdentifier=$env:RUNTIME

      - name: Build Solution
        if: success()
        run: |
          msbuild $env:SOLUTION `
            /p:Platform=$env:TARGET_PLATFORM `
            /p:Configuration=$env:CONFIGURATION `
            /p:AssemblyVersion=$env:BUILD_VERSION `
            /p:FileVersion=$env:BUILD_VERSION `
            /p:Version=$env:BUILD_VERSION `
            /p:Framework=$env:TARGET_FRAMEWORK `
            /p:OutputPath=..\..\$env:OUTPUT_PATH

      - name: Compress Files
        if: success()
        run:  Compress-Archive $env:OUTPUT_PATH\* -DestinationPath v${{ env.BUILD_VERSION }}.zip -CompressionLevel Optimal
      
      - name: Publish release
        uses: softprops/action-gh-release@v2.0.5
        if: success()
        with:
          files: v$env:BUILD_VERSION.zip
          token: ${{ secrets.GITHUB_TOKEN }}
