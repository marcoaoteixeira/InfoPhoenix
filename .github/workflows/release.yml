name: Publish Cycle

on:
  release:
    types: [published]

env:
  OUTPUT_PATH: './release'

jobs:

  publishing:

    runs-on: windows-latest

    strategy:
      matrix:
        dotnet-version: ['8.0.x']

    steps:
      - name: Get Build Version
        id: build
        run: |
          $GITHUB_OUTPUT = [regex]::split($env:GITHUB_REF, "v(.*)")[1]
          Write-Host "Versão: v$($GITHUB_OUTPUT)"
          Write-Host "Github ref: $($env:GITHUB_REF)"

      - name: Checkout Source Code
        uses: actions/checkout@v4.1.6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup GitHub Package Registry for NuGet
        run: |
          dotnet nuget add source `
          --username ${{ github.repository_owner }} `
          --password ${{ secrets.GITHUB_TOKEN }} `
          --store-password-in-clear-text `
          --name github ${{ vars.NUGET_SOURCE_URL }}

      - name: Restore Solution
        run: dotnet restore ./Release.sln

      - name: Build Solution => Release
        if: success()
        run: |
          dotnet build ./Release.sln `
          -p:Version=${{ steps.build.outputs.version }} `
          --output ${{ env.OUTPUT_PATH }} `
          --configuration Release `
          --no-restore `
          --self-contained `
          --verbosity normal

      - name: Compress Files
        if: success()
        run:  cd ${{ env.OUTPUT_PATH }};Compress-Archive * -DestinationPath ..\v${{ steps.build.outputs.version }}.zip -CompressionLevel Optimal;cd ..
      
      - name: Publish release
        uses: softprops/action-gh-release@v2.0.5
        if: success()
        with:
          files: v${{ steps.build.outputs.version }}.zip
