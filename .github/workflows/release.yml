name: Publish Cycle

on:
  release:
    types: [published]

env:
  OUTPUT_PATH: '.\release'
  PROJECT_PATH: '.\src\Nameless.InfoPhoenix.Client\Nameless.InfoPhoenix.Client.csproj'

jobs:

  publishing:

    runs-on: windows-latest

    strategy:
      matrix:
        dotnet-version: ['8.0.x']
        vs-version: ['17.8.3']

    steps:
      - name: Get Build Version
        id: build
        run: |
          $BUILD_VERSION = [regex]::split($env:GITHUB_REF, "v(.*)")[1]
          Write-Output BUILD_VERSION=$BUILD_VERSION >> $env:GITHUB_ENV
          Write-Host "v$BUILD_VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: ${{ matrix.vs-version }}

      - name: Checkout Source Code
        uses: actions/checkout@v4.1.6

      - name: Setup GitHub Package Registry for NuGet
        run: |
          dotnet nuget add source `
          --username ${{ github.repository_owner }} `
          --password ${{ secrets.GITHUB_TOKEN }} `
          --store-password-in-clear-text `
          --name github ${{ vars.NUGET_SOURCE_URL }}

      - name: Restore Solution
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build Solution => Release
        if: success()
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
          -p:Version=${{ env.BUILD_VERSION }} `
          -p:PublishSingleFile=True `
          --configuration Release `
          --runtime win-x64 `
          --framework net6.0-windows `
          --output ${{ env.OUTPUT_PATH }} `
          --self-contained `
          --no-restore `
          --verbosity normal

      - name: Compress Files
        if: success()
        run:  cd ${{ env.OUTPUT_PATH }};Compress-Archive * -DestinationPath ..\v${{ env.BUILD_VERSION }}.zip -CompressionLevel Optimal;cd ..
      
      - name: Publish release
        uses: softprops/action-gh-release@v2.0.5
        if: success()
        with:
          files: v${{ env.BUILD_VERSION }}.zip
